<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-labelledby="arcTitle">
  <title id="arcTitle">Abstract energy reactor animation</title>
  <defs>
    <radialGradient id="g1" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#9EE8FF" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#4FB7FF" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#2b7cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="none"/>
  <g transform="translate(120,120)">
    <circle r="64" fill="url(#g1)" opacity="0.95"/>
    <g id="rings" filter="url(#glow)">
      <circle r="60" fill="none" stroke="#64c8ff" stroke-opacity="0.28" stroke-width="3"/>
      <circle r="44" fill="none" stroke="#8cd8ff" stroke-opacity="0.55" stroke-width="6"/>
      <circle r="28" fill="none" stroke="#c7f0ff" stroke-opacity="0.9" stroke-width="3"/>
      <g id="inner" transform="rotate(0)">
        <path d="M-18 -8 L 18 -8 L 0 18 Z" fill="#dffcff" opacity="0.95"/>
      </g>
    </g>
    <circle r="8" fill="#eaffff"/>
  </g>
  <style>
    /* simple SVG-first animation: rotate inner and pulse rings */
    @keyframes reactor-rotate { to { transform: rotate(360deg); } }
    @keyframes reactor-pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
    #rings { transform-origin: 120px 120px; animation: reactor-pulse 2.8s ease-in-out infinite; }
    #inner { transform-origin: 120px 120px; animation: reactor-rotate 12s linear infinite; }
    @media (prefers-reduced-motion: reduce) { #rings, #inner { animation: none; } }
  </style>
</svg>
